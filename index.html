<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 요청하신 대중적인 글로벌 명칭으로 교체 -->
    <title>QR code generator</title>
    <!-- Tailwind CSS (현대적인 모바일 앱 레이아웃용) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- 고급 QR 스타일링 라이브러리 (CORS 없는 순수 프론트엔드 연산) -->
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4 select-none">

    <!-- 앱 형태의 스마트 콤팩트 카드 -->
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col justify-between min-h-[720px]">
        
        <!-- 상단 모바일 앱 스타일 헤더 -->
        <div class="p-5 text-center border-b border-gray-50 bg-white sticky top-0 z-10">
            <h1 class="text-xl font-black text-gray-900 tracking-tight">QR code generator</h1>
            <p class="text-xs text-gray-400 mt-0.5">나만의 커스텀 QR 코드를 1초 만에 디자인하세요</p>
        </div>

        <!-- 메인 제어 및 입력 영역 -->
        <div class="p-6 flex-1 overflow-y-auto space-y-5">
            
            <!-- 1. URL 입력창 -->
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1.5 pl-1">연결할 웹사이트 주소 (URL)</label>
                <input type="url" id="urlInput" placeholder="https://example.com" value="https://"
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-sm font-medium focus:outline-none focus:border-gray-900 transition-all shadow-inner">
            </div>

            <!-- 2. 차별화 커스텀 옵션 패널 -->
            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 space-y-4">
                
                <!-- 디자인 스타일 세그먼트 버튼 -->
                <div>
                    <span class="block text-xs font-bold text-gray-500 mb-1.5 pl-1">디자인 스타일</span>
                    <div class="flex gap-1.5 bg-gray-200/60 p-1 rounded-xl">
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="dotStyle" value="square" class="sr-only peer">
                            <div class="py-2 text-xs font-semibold rounded-lg bg-transparent text-gray-500 peer-checked:bg-white peer-checked:text-gray-900 peer-checked:shadow-sm transition-all">클래식</div>
                        </label>
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="dotStyle" value="rounded" checked class="sr-only peer">
                            <div class="py-2 text-xs font-semibold rounded-lg bg-transparent text-gray-500 peer-checked:bg-white peer-checked:text-gray-900 peer-checked:shadow-sm transition-all">트렌디 라운드</div>
                        </label>
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="dotStyle" value="dots" class="sr-only peer">
                            <div class="py-2 text-xs font-semibold rounded-lg bg-transparent text-gray-500 peer-checked:bg-white peer-checked:text-gray-900 peer-checked:shadow-sm transition-all">미니 도트</div>
                        </label>
                    </div>
                </div>

                <!-- 색상 테마 세그먼트 버튼 -->
                <div>
                    <span class="block text-xs font-bold text-gray-500 mb-1.5 pl-1">색상 테마</span>
                    <div class="flex gap-1.5 bg-gray-200/60 p-1 rounded-xl">
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="colorStyle" value="black" checked class="sr-only peer">
                            <div class="py-2 text-xs font-semibold rounded-lg bg-transparent text-gray-500 peer-checked:bg-white peer-checked:text-gray-900 peer-checked:shadow-sm transition-all">모던 블랙</div>
                        </label>
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="colorStyle" value="blue" class="sr-only peer">
                            <div class="py-2 text-xs font-semibold rounded-lg bg-transparent text-gray-500 peer-checked:bg-white peer-checked:text-blue-600 peer-checked:shadow-sm transition-all">오션 블루</div>
                        </label>
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="colorStyle" value="gradient" class="sr-only peer">
                            <div class="py-2 text-xs font-semibold rounded-lg bg-transparent text-gray-500 peer-checked:bg-white peer-checked:text-purple-600 peer-checked:shadow-sm transition-all">그라데이션</div>
                        </label>
                    </div>
                </div>

                <!-- 중앙 아이콘 로고 세그먼트 버튼 (브랜드 정체성 부여) -->
                <div>
                    <span class="block text-xs font-bold text-gray-500 mb-1.5 pl-1">중앙 아이콘 로고</span>
                    <div class="grid grid-cols-4 gap-1.5 bg-gray-200/60 p-1 rounded-xl">
                        <label class="text-center cursor-pointer">
                            <input type="radio" name="logoStyle" value="none" checked class="sr-only peer">
                            <div class="py-2 text-xs font-semibold rounded-lg bg-transparent text-gray-500 peer-checked:bg-white peer-checked:text-gray-900 peer-checked:shadow-sm transition-all">없음</div>
                        </label>
                        <label class="text-center cursor-pointer">
                            <input type="radio" name="logoStyle" value="instagram" class="sr-only peer">
                            <div class="py-2 text-xs font-semibold rounded-lg bg-transparent text-gray-500 peer-checked:bg-white peer-checked:text-pink-600 peer-checked:shadow-sm transition-all">인스타</div>
                        </label>
                        <label class="text-center cursor-pointer">
                            <input type="radio" name="logoStyle" value="wifi" class="sr-only peer">
                            <div class="py-2 text-xs font-semibold rounded-lg bg-transparent text-gray-500 peer-checked:bg-white peer-checked:text-blue-500 peer-checked:shadow-sm transition-all">와이파이</div>
                        </label>
                        <label class="text-center cursor-pointer">
                            <input type="radio" name="logoStyle" value="store" class="sr-only peer">
                            <div class="py-2 text-xs font-semibold rounded-lg bg-transparent text-gray-500 peer-checked:bg-white peer-checked:text-emerald-600 peer-checked:shadow-sm transition-all">상점</div>
                        </label>
                    </div>
                </div>

            </div>

            <!-- 생성 버튼 -->
            <button onclick="generateQR()" 
                    class="w-full py-3.5 bg-gray-900 text-white font-bold rounded-2xl text-sm hover:bg-black active:scale-[0.98] transition-all shadow-lg shadow-gray-200">
                실시간 커스텀 QR 코드 생성하기
            </button>

            <!-- 3. QR 코드 결과창 및 안내 문구 -->
            <div class="relative flex items-center justify-center p-4 bg-gray-50 rounded-2xl border border-dashed border-gray-200 w-60 h-60 mx-auto shadow-inner">
                <div id="qrcode" class="transition-all duration-300"></div>
                <div id="placeholderText" class="absolute text-center text-xs font-medium text-gray-400 leading-relaxed">
                    상단에 주소를 입력하고<br><span class="text-gray-600 font-bold">생성 버튼</span>을 누르면<br>나만의 예쁜 QR이 완성됩니다.
                </div>
            </div>

            <!-- 4. 액션 제어 그룹 (기본 히든) -->
            <div id="actionButtons" class="grid grid-cols-2 gap-3 opacity-0 pointer-events-none transition-all duration-300">
                <button onclick="downloadQR()" 
                        class="w-full py-3 bg-gray-800 text-white font-bold rounded-2xl text-xs hover:bg-gray-900 active:scale-95 transition-all flex items-center justify-center gap-1 shadow-md shadow-gray-100">
                    💾 기기에 저장 (PNG)
                </button>
                <button onclick="shareQR()" 
                        class="w-full py-3 bg-gray-100 text-gray-700 font-bold rounded-2xl text-xs hover:bg-gray-200 active:scale-95 transition-all flex items-center justify-center gap-1">
                    🔗 QR 즉시 공유하기
                </button>
            </div>

        </div>

        <!-- 하단 비즈니스 연동 마케팅 배너 -->
        <a href="https://smartstore.naver.com/지정할상점주소" target="_blank" 
           class="m-5 p-4 bg-gradient-to-r from-emerald-500 to-green-600 rounded-2xl text-white text-center shadow-lg shadow-green-100 hover:opacity-95 active:scale-98 transition-all flex items-center justify-center gap-3">
            <span class="text-2xl">🛒</span>
            <div class="text-left">
                <p class="text-xs font-semibold opacity-90">이 QR 코드로 실물 아크릴 굿즈 만들기</p>
                <p class="text-sm font-black">매장 비치용 안내판 / 방수 스티커 인쇄하기</p>
            </div>
        </a>

    </div>

    <!-- 스크립트 엔진 파트 -->
    <script>
        let qrCodeInstance = null;

        // 초경량 인라인 독립형 로고 소스 (CORS 에러 완벽 방지용 Base64 데이터)
        const LOGO_IMAGES = {
            instagram: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZTEzMDZjIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIge2xpbmVqb2luPSJyb3VuZCI+PHJlY3QgeD0iMiIgeT0iMiIgd2lkdGg9IjIwIiBoZWlnaHQ9IjIwIiByeD0iNSIgcnk9IjUiPjwvcmVjdD48cGF0aCBkPSJNMTYgMTEuMzdBNDQgMCAxIDEgMTIuNjMgOCA0IDQgMCAwIDEgMTYgMTEuMzd6Ij48L3BhdGg+PGxpbmUgeDE9IjE3LjUiIHkxPSI2LjUiIHgyPSIxNy41MSIgeTI9IjYuNSI+PC9saW5lPjwvc3ZnPg==",
            wifi: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMmI2Y2I0IiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTEgOGExNi4zOCAxNi4zOCAwIDAgMSA4LTYgMTYuMzggMTYuMzggMCAwIDEgOCA2Ij48L3BhdGg+PHBhdGggZD0iTTUgMTJhMTAuODkgMTAuODkgMCAwIDEgNy0zIDEwLjg5IDEwLjg5IDAgMCAxIDcgMyI+PC9wYXRoPjxwYXRoIGQ9Ik05IDE2YTYgNiAwIDAgMSA2IDAgNiA2IDAgMCAxIDYgMCI+PC9wYXRoPjxsaW5lIHgxPSIxMiIgeTE9IjIwIiB4Mj0iMTIuMDEiIHkyPSIyMCI+PC9saW5lPjwvc3ZnPg==",
            store: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMTZjNzg0IiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PGNpcmNsZSBjeD0iOSIgY3k9IjIxIiByPSIxIj48L2NpcmNsZT48Y2lyY2xlIGN4PSIyMCIgY3k9IjIxIiByPSIxIj48L2NpcmNsZT48cGF0aCBkPSJNMSAxaDRsMi42OCAxMy4zOWExIDIgMCAwIDAgMiAuNzhoOS43MmExIDIgMCAwIDAgMi0uNzRMMjMgNkg2Ij48L3BhdGg+PC9zdmc+"
        };

        function generateQR() {
            const url = document.getElementById('urlInput').value.trim();
            const container = document.getElementById("qrcode");
            const placeholder = document.getElementById('placeholderText');
            const actionButtons = document.getElementById('actionButtons');

            if (!url || url === "https://") {
                alert('올바른 주소(URL)를 입력해 주세요!');
                return;
            }

            // 컨테이너 초기화 및 가이드 문구 가리기
            container.innerHTML = "";
            placeholder.style.opacity = "0";

            // 사용자가 선택한 라디오 세그먼트 값 가져오기
            const selectedDotStyle = document.querySelector('input[name="dotStyle"]:checked').value;
            const selectedColorStyle = document.querySelector('input[name="colorStyle"]:checked').value;
            const selectedLogoStyle = document.querySelector('input[name="logoStyle"]:checked').value;

            // 1. 도트 스타일 및 색상 세팅 빌드
            let dotsOptions = { type: selectedDotStyle };
            if (selectedColorStyle === 'gradient') {
                dotsOptions.gradient = {
                    type: 'linear',
                    rotation: 45,
                    colorStops: [
                        { offset: 0, color: '#711c91' }, // 화려한 퍼플-네온 핑크 그라데이션
                        { offset: 1, color: '#ea00d9' }
                    ]
                };
            } else if (selectedColorStyle === 'blue') {
                dotsOptions.color = '#1d4ed8'; // 신뢰감을 주는 블루
            } else {
                dotsOptions.color = '#1f2937'; // 기본 모던 시크 블랙
            }

            // 2. 선택한 매칭 로고 소스 로드
            const logoUrl = LOGO_IMAGES[selectedLogoStyle] || null;

            // 3. 고급 QR 디자인 렌더링 인스턴스화
            qrCodeInstance = new QRCodeStyling({
                width: 200,
                height: 200,
                type: "svg",
                data: url,
                image: logoUrl,
                dotsOptions: dotsOptions,
                backgroundOptions: {
                    color: "#ffffff",
                },
                imageOptions: {
                    crossOrigin: "anonymous",
                    hideBackgroundDots: true, // 로고 뒷배경 도트 투명 자동화로 가독성 확보
                    imageSize: 0.4,
                    margin: 4
                },
                cornersSquareOptions: {
                    type: selectedDotStyle === 'square' ? 'square' : 'extra-rounded',
                    color: dotsOptions.color || '#1f2937'
                },
                cornersDotOptions: {
                    type: selectedDotStyle === 'square' ? 'square' : 'dot',
                    color: dotsOptions.color || '#1f2937'
                }
            });

            // 화면에 렌더링
            qrCodeInstance.append(container);

            // 하단 조작 버튼 활성화
            actionButtons.classList.remove('opacity-0', 'pointer-events-none');
        }

        // 고해상도 PNG 파일 다운로드 엔진
        function downloadQR() {
            if (!qrCodeInstance) return;
            qrCodeInstance.download({ name: "qrcode_generator_allforyou", extension: "png" });
        }

        // 모바일 기기 네이티브 소셜 공유 연동
        async function shareQR() {
            if (!qrCodeInstance) return;
            try {
                // 브라우저 캐시에서 로컬 바이너리 데이터 추출
                const blob = await qrCodeInstance.getRawData("png");
                const file = new File([blob], 'qrcode.png', { type: 'image/png' });

                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: '생성된 QR 코드 디자인 공유',
                        text: 'QR code generator에서 커스텀된 QR 코드입니다.'
                    });
                } else {
                    alert('모바일 기기(스마트폰/태블릿) 환경에서 실행하시면 카카오톡이나 메시지로 즉시 전송·공유가 가능합니다!');
                }
            } catch (error) {
                console.error('공유 기능 연동 중 오류 발생:', error);
            }
        }
    </script>
</body>
</html>
