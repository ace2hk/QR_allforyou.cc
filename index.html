<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR All For You</title>
    <!-- Tailwind CSS (디자인용) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- QRCode.js 라이브러리 (클라이언트 사이드 생성용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- 앱 형태의 콤팩트한 카드 레이아웃 -->
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col justify-between min-h-[600px]">
        
        <!-- 상단 헤더 -->
        <div class="p-6 text-center border-b border-gray-100">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">QR All For You</h1>
            <p class="text-xs text-gray-400 mt-1">간편하고 안전한 QR 코드 생성기</p>
        </div>

        <!-- 중앙 메인 콘텐츠 영역 -->
        <div class="p-6 flex-1 flex flex-col items-center justify-center space-y-6">
            
            <!-- URL 입력창 -->
            <div class="w-full">
                <label class="block text-xs font-semibold text-gray-500 mb-2 pl-1">연결할 웹사이트 주소(URL)</label>
                <div class="flex gap-2">
                    <input type="url" id="urlInput" placeholder="https://example.com" 
                           class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-sm focus:outline-none focus:border-blue-500 transition-all">
                    <button onclick="generateQR()" 
                            class="px-5 py-3 bg-blue-600 text-white font-medium rounded-2xl text-sm hover:bg-blue-700 active:scale-95 transition-all shadow-md shadow-blue-100">
                        생성
                    </button>
                </div>
            </div>

            <!-- QR 코드 출력 공간 -->
            <div class="relative flex items-center justify-center p-4 bg-gray-50 rounded-2xl border border-gray-100 w-56 h-56 shadow-inner">
                <div id="qrcode" class="transition-all duration-300"></div>
                <!-- 초기 안내 문구 -->
                <div id="placeholderText" class="absolute text-center text-sm text-gray-400">
                    주소를 입력하고<br>생성 버튼을 눌러주세요
                </div>
            </div>

            <!-- 액션 버튼 그룹 (기본 히든) -->
            <div id="actionButtons" class="w-full grid grid-cols-2 gap-3 opacity-0 pointer-events-none transition-all duration-300">
                <button onclick="downloadQR()" 
                        class="w-full py-3 bg-gray-800 text-white font-medium rounded-2xl text-sm hover:bg-gray-900 active:scale-95 transition-all flex items-center justify-center gap-1">
                    💾 기기에 저장
                </button>
                <button onclick="shareQR()" 
                        class="w-full py-3 bg-gray-200 text-gray-700 font-medium rounded-2xl text-sm hover:bg-gray-300 active:scale-95 transition-all flex items-center justify-center gap-1">
                    🔗 QR 공유하기
                </button>
            </div>

        </div>

        <!-- 하단 마케팅 배너 (네이버 스마트스토어 연동) -->
        <a href="https://smartstore.naver.com/지정할상점주소" target="_blank" 
           class="m-6 p-4 bg-gradient-to-r from-emerald-500 to-green-600 rounded-2xl text-white text-center shadow-lg shadow-green-100 hover:opacity-95 active:scale-98 transition-all flex items-center justify-center gap-2">
            <span class="text-xl">🛒</span>
            <div class="text-left">
                <p class="text-xs font-medium opacity-90">이 QR 코드로 굿즈 만들기</p>
                <p class="text-sm font-bold">오프라인 아크릴 스탠드 / 스티커 인쇄하기</p>
            </div>
        </a>

    </div>

    <!-- 로직 스크립트 -->
    <script>
        let qrcodeInstance = null;

        function generateQR() {
            const url = document.getElementById('urlInput').value.trim();
            const qrContainer = document.getElementById('qrcode');
            const placeholder = document.getElementById('placeholderText');
            const actionButtons = document.getElementById('actionButtons');

            if (!url) {
                alert('주소를 입력해 주세요!');
                return;
            }

            // 기존 QR 삭제 후 새로 생성
            qrContainer.innerHTML = "";
            placeholder.style.opacity = "0";

            qrcodeInstance = new QRCode(qrContainer, {
                text: url,
                width: 192,
                height: 192,
                colorDark : "#1f2937",
                colorLight : "#f9fafb",
                correctLevel : QRCode.CorrectLevel.H
            });

            // 버튼 스무스하게 등장
            actionButtons.classList.remove('opacity-0', 'pointer-events-none');
        }

        // 브라우저 Canvas 기능을 이용한 스of리지 제로 다운로드
        function downloadQR() {
            const qrImg = document.querySelector('#qrcode img');
            if (!qrImg) return;

            const link = document.createElement('a');
            link.href = qrImg.src;
            link.download = 'qrcode_allforyou.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 모바일 웹 공유 API 활성화
        async function shareQR() {
            const qrImg = document.querySelector('#qrcode img');
            if (!qrImg) return;

            try {
                // base64 이미지를 파일 객체로 변환
                const response = await fetch(qrImg.src);
                const blob = await response.blob();
                const file = new File([blob], 'qrcode.png', { type: 'image/png' });

                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'QR 코드 공유',
                        text: 'qr.allforyou.cc 에서 생성된 QR 코드입니다.'
                    });
                } else {
                    // 모바일 공유를 지원하지 않는 브라우저(PC 등)는 클립보드 카피 우회
                    alert('모바일 기기에서 접속하시면 카카오톡 등으로 즉시 공유가 가능합니다! 대신 다운로드 버튼을 이용해 주세요.');
                }
            } catch (error) {
                console.error('공유 실패:', error);
            }
        }
    </script>
</body>
</html>
